name: plugin-ci (reusable)
on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '20'
      bun-version:
        type: string
        default: '1.1.38'
concurrency:
  group: plugin-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: ${{ inputs.bun-version }}
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: Verify submodule integrity
        shell: bash
        run: |
          if [ -f .gitmodules ]; then
            git submodule status
            while IFS= read -r path; do
              if [ ! -e "$path/.git" ]; then
                echo "::error::Submodule $path not initialized"
                exit 1
              fi
              (cd "$path" && git describe --exact-match --tags HEAD >/dev/null 2>&1) || {
                echo "::warning::Submodule $path is not pinned to a tag"
              }
            done < <(git config --file .gitmodules --get-regexp '\.path$' | awk '{print $2}')
          fi
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint (if script exists)
        shell: bash
        run: |
          if grep -q '"lint"' package.json; then bun run lint; else echo "no lint script — skipping"; fi
      - name: Typecheck (if script exists)
        shell: bash
        run: |
          if grep -q '"typecheck"' package.json; then bun run typecheck; else echo "no typecheck script — skipping"; fi
      - name: Test (if script exists)
        shell: bash
        run: |
          if grep -q '"test"' package.json; then bun run test; else echo "no test script — skipping"; fi
      - name: Build
        run: bun run build
